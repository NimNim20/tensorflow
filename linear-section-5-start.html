<!DOCTYPE html>
<html>

<head>
  <title>TensorFlow.js linear regression</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

  <style>
    body {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    main {
      flex: 1 0 auto;
    }

    pre {
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <!--   Header   -->
  <div class="section no-pad-bot" id="index-banner">
    <div class="container">
      <h5 class="header center blue-text small">Linear regression with TensorFlow.js</h5>
      <div class="row center">
        <h6 class="header col s12 light">Train a model to predict medical insurance cost based on age.</h6>
      </div>
    </div>
  </div>

  <!--   Misc buttons   -->
  <div class="section no-pad-bot light-blue lighten-4">
    <div class="container">
      <div class="row center">
        <br />
        <button id="toggle-button" class="waves-effect waves-light light-blue btn-small" onclick="toggleVisor()">Toggle
          Visor</button>
        <br /><br />
      </div>
    </div>
  </div>

  <!--   Main functionality   -->
  <div class="container">
    <div class="section">

      <div class="row">
        <!--   Training   -->
        <div class="col s12 m6">
          <div class="icon-block">
            <h3 class="center light-blue-text"><i class="material-icons" style="font-size: 2em">build</i></h3>
            <h5 class="center">Train & Test</h5>

            <p class="light"></p>

            <div>
              <p><label>Training status:</label></p>
              <pre class="grey lighten-4" style="overflow-x: auto"><em id="model-status">Loading data...</em></pre>

              <p><label>Epoch:</label></p>
              <pre class="grey lighten-4"><em id="epoch-status">0</em></pre>

              <p><label>Testing status:</label></p>
              <pre class="grey lighten-4" style="overflow-x: auto"><em id="testing-status">Not yet tested</em></pre>

              <button autocomplete="off" id="train-button" class="waves-effect light-blue waves-light btn" disabled
                onclick="train()">Train New Model</button>
              <button autocomplete="off" id="test-button" class="waves-effect light-blue waves-light btn" disabled
                onclick="test()">Test Model</button>
            </div>
            <br />

            <div>
              <button autocomplete="off" id="load-button" class="waves-effect light-blue waves-light btn-small" disabled
                onclick="load()">Load Model</button>
              <button autocomplete="off" id="save-button" class="waves-effect light-blue waves-light btn-small" disabled
                onclick="save()">Save Model</button>
            </div>

          </div>
        </div>

        <!--   Prediction   -->
        <div class="col s12 m6">
          <div class="icon-block">
            <h3 class="center light-blue-text"><i class="material-icons" style="font-size: 2em">timeline</i></h3>
            <h5 class="center">Predict</h5>

            <label>Age: <input type="number" id="prediction-input" placeholder="27" /></label>
            <button autocomplete="off" id="predict-button" class="waves-effect light-blue waves-light btn" disabled
              onclick="predict()">Predict insurance cost</button>
            <p><strong id="prediction-output"></strong></p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="text/javascript">
    let model;

    let points;

    let featureMin;
    let featureMax;

    let labelMin;
    let labelMax;

    let normalisedFeature;
    let normalisedLabel;

    let trainingFeatureTensor;
    let testingFeatureTensor;

    let trainingLabelTensor;
    let testingLabelTensor;

    function toggleVisor() {
      tfvis.visor().toggle();
    }

    async function plot(pointsArray, featureName, predictedPointsArray = null) {
      const values = [pointsArray];
      const series = ["original"];
      if (Array.isArray(predictedPointsArray)) {
        values.push(predictedPointsArray);
        series.push("predicted");
      }

      tfvis.render.scatterplot(
        { name: `${featureName} vs Insurance Cost` },
        { values, series },
        {
          xLabel: featureName,
          yLabel: "Price",
        }
      );
    }

    async function plotPredictionLine() {
      const [xs, ys] = tf.tidy(() => {

        const normalisedXs = tf.linspace(0, 1, 100);
        const normalisedYs = model.predict(normalisedXs.reshape([100, 1]));

        const xs = denormalise(normalisedXs, normalisedFeature.min, normalisedFeature.max);
        const ys = denormalise(normalisedYs, normalisedLabel.min, normalisedLabel.max);

        return [xs.dataSync(), ys.dataSync()];
      });

      const predictedPoints = Array.from(xs).map((val, i) => {
        return { x: val, y: ys[i] }
      });

      await plot(points, "Age", predictedPoints);
    }

    function normalise(tensor, previousMin = null, previousMax = null) {
      const min = previousMin || tensor.min();
      const max = previousMax || tensor.max();
      const normalisedTensor = tensor.sub(min).div(max.sub(min));
      return {
        tensor: normalisedTensor,
        min,
        max
      };
    }

    function denormalise(tensor, min, max) {
      const denormalisedTensor = tensor.mul(max.sub(min)).add(min);
      return denormalisedTensor;
    }

    function createModel() {
      const model = tf.sequential();

      // Here we decide how many inputs we can have. Since we are only checking square feet, we only need inputDim to be 1.
      model.add(tf.layers.dense({
        inputDim: 1,
        units: 1,
        activation: "linear",
        useBias: true
      }));

      const optimizer = tf.train.adam(0.01);

      model.compile({
        optimizer,
        loss: "meanSquaredError"
      });

      tfvis.show.modelSummary({ name: `Model Summary`, tab: `Model` }, model);
      tfvis.show.layer({ name: `Layer 1`, tab: `Model Inspection` }, model.getLayer(undefined, 0));

      model.summary();

      return model;
    }

    async function trainModel(model, trainingFeatureTensor, trainingLabelTensor) {
      const { onBatchEnd, onEpochEnd } = tfvis.show.fitCallbacks(
        { name: "Training Performance" },
        ["loss"]
      );

      // Epochs decides how many times the AI runs the training model
      await model.fit(trainingFeatureTensor, trainingLabelTensor, {
        epochs: 5,
        shuffle: true,
        callbacks: {
          onBatchEnd,
          onEpochBegin: async function () {
            tfvis.show.layer({ name: `Layer 1` }, model.getLayer(undefined, 0));
            await plotPredictionLine();
          },
          onEpochEnd: async function (epoch, logs) {
            document.getElementById("epoch-status").innerText =
              `Epoch ${epoch + 1} | Loss: ${logs.loss.toFixed(4)}`;
          }
        }
      });
    }

    async function train() {
      await trainModel(
        model,
        trainingFeatureTensor,
        trainingLabelTensor
      );

      await plotPredictionLine();

      document
        .getElementById("predict-button")
        .removeAttribute("disabled");

      console.log("Training complete!")
    }

    async function testModel(model, testingFeatureTensor, testingLabelTensor) {
      const result = model.evaluate(testingFeatureTensor, testingLabelTensor);

      const lossTensor = Array.isArray(result) ? result[0] : result;

      const loss = await lossTensor.dataSync()[0];

      return loss;
    }

    async function test() {
      const loss = await testModel(
        model,
        testingFeatureTensor,
        testingLabelTensor
      );

      document.getElementById("testing-status").innerText =
        `Test Loss: ${loss.toFixed(4)}`;

      const preds = model.predict(testingFeatureTensor);

      await plot(
        await testingFeatureTensor.array(),
        "Age",
        await preds.array()
      );

      console.log("Testing Complete!");
    }

    async function save() {
      await model.save("localstorage://insurance-model");
    }

    async function load() {
      model = await tf.loadLayersModel("localstorage://insurance-model");

      document.getElementById("predict-button").removeAttribute("disabled");

      console.log("Model loaded!");

      tfvis.show.modelSummary(
        { name: `Model Summary`, tab: `Model` },
        model
      );

      tfvis.show.layer(
        { name: `Layer 1`, tab: `Model Inspection` },
        model.getLayer(undefined, 0)
      );

      await plotPredictionLine();

      document.getElementById("model-status").innerText =
        "Model loaded. Ready to predict.";

      document.getElementById("train-button").removeAttribute("disabled");
      document.getElementById("test-button").removeAttribute("disabled");
    }

    async function predict() {
      if (!model) {
        console.log("Model not loaded.");
        return;
      }

      const inputValue = Number(document.getElementById("prediction-input").value);

      if (isNaN(inputValue)) {
        document.getElementById("prediction-output").innerText =
          "Please enter a valid age.";
        return;
      }

      const inputTensor = tf.tensor2d([[inputValue]]);

      // Normalise input
      const normalisedInput = inputTensor
        .sub(featureMin)
        .div(featureMax.sub(featureMin));

      // Predict
      const predictionTensor =
        model.predict(normalisedInput);

      // Denormalise prediction
      const denormalisedPrediction = denormalise(
        predictionTensor,
        labelMin,
        labelMax
      );

      const prediction =
        denormalisedPrediction.dataSync()[0];

      document.getElementById(
        "prediction-output"
      ).innerText =
        `Predicted Insurance Cost: $${prediction.toFixed(2)}`;
    }

    async function run() {
      document.getElementById("model-status").innerText =
        "Loading dataset...";

      const insuranceDataSet = tf.data.csv("medical_insurance_cost_dataset.csv");

      const pointsDataset = insuranceDataSet.map(record => ({
        x: Number(record.age),
        y: Number(record.annual_medical_cost_usd),
      }))
        .filter(point =>
          !isNaN(point.x) &&
          !isNaN(point.y)
        );

      points = await pointsDataset.toArray();

      if (points.length % 2 !== 0) {
        points.pop();
      }

      tf.util.shuffle(points);
      plot(points, "Age");

      document.getElementById("model-status").innerText =
        "Dataset loaded. Preparing tensors...";

      // Create tensors
      const featureValues = points.map(p => p.x);
      const labelValues = points.map(p => p.y);

      const featureTensor = tf.tensor2d(featureValues, [featureValues.length, 1]);
      const labelTensor = tf.tensor2d(labelValues, [labelValues.length, 1]);

      // Normalize
      normalisedFeature = normalise(featureTensor);
      normalisedLabel = normalise(labelTensor);

      featureMin = normalisedFeature.min;
      featureMax = normalisedFeature.max;
      labelMin = normalisedLabel.min;
      labelMax = normalisedLabel.max;

      document.getElementById("model-status").innerText =
        "Tensors ready. Creating model...";

      // Split data
      [trainingFeatureTensor, testingFeatureTensor] =
        tf.split(normalisedFeature.tensor, 2);

      [trainingLabelTensor, testingLabelTensor] =
        tf.split(normalisedLabel.tensor, 2);

      model = createModel();

      document.getElementById("model-status").innerText =
        "Model created. Ready to train.";

      document.getElementById("train-button").removeAttribute("disabled");
      document.getElementById("test-button").removeAttribute("disabled");
      document.getElementById("load-button").removeAttribute("disabled");
      document.getElementById("save-button").removeAttribute("disabled");
    }

    run();
  </script>

</body>

</html>
