<!DOCTYPE html>
<html>

<head>
  <title>TensorFlow.js Linear Regression</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

  <style>
    body {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
    }

    main {
      flex: 1 0 auto;
    }

    pre {
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="section no-pad-bot">
    <div class="container">
      <h5 class="header center blue-text small">
        Linear Regression with TensorFlow.js
      </h5>

      <div class="row center">
        <h6 class="header col s12 light">
          Train a model to predict medical insurance cost based on age.
        </h6>
      </div>
    </div>
  </div>

  <!-- Visor Sideview -->
  <div class="section no-pad-bot light-blue lighten-4">
    <div class="container">
      <div class="row center">
        <br />

        <button class="waves-effect waves-light light-blue btn-small" onclick="toggleVisor()">
          Toggle Visor
        </button>

        <br /><br />
      </div>
    </div>
  </div>

  <div class="container">
    <div class="section">

      <div class="row">

        <!-- Training section -->
        <div class="col s12 m6">
          <div class="icon-block">

            <h3 class="center light-blue-text">
              <i class="material-icons" style="font-size: 2em">build</i>
            </h3>

            <h5 class="center">Train & Test</h5>

            <p><label>Training status:</label></p>

            <pre class="grey lighten-4">
              <em id="model-status">Loading...</em>
            </pre>

            <p><label>Epoch:</label></p>

            <pre class="grey lighten-4">
              <em id="epoch-status">0</em>
            </pre>

            <p><label>Testing status:</label></p>

            <pre class="grey lighten-4">
              <em id="testing-status">Not yet tested</em>
            </pre>

            <button id="train-button" class="waves-effect light-blue waves-light btn" disabled onclick="train()">
              Train Model
            </button>

            <button id="test-button" class="waves-effect light-blue waves-light btn" disabled onclick="test()">
              Test Model
            </button>
            <br /><br />
            <button id="load-button" class="waves-effect light-blue waves-light btn-small" disabled
              onclick="loadModel()">
              Load Model
            </button>

            <button id="save-button" class="waves-effect light-blue waves-light btn-small" disabled
              onclick="saveModel()">
              Save Model
            </button>
          </div>
        </div>

        <!-- Prediction section -->
        <div class="col s12 m6">
          <div class="icon-block">
            <h3 class="center light-blue-text">
              <i class="material-icons" style="font-size: 2em">timeline</i>
            </h3>

            <h5 class="center">Predict</h5>

            <label>
              Age:
              <input type="number" id="prediction-input" placeholder="27">
            </label>

            <button id="predict-button" class="waves-effect light-blue waves-light btn" disabled onclick="predict()">
              Predict Insurance Cost
            </button>

            <p>
              <strong id="prediction-output"></strong>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

    // Statemanagement of our different features and labels.
    const state = {
      model: null,
      points: [],

      normalization: {
        featureMin: null,
        featureMax: null,
        labelMin: null,
        labelMax: null,
      },

      tensors: {
        trainingFeatures: null,
        trainingLabels: null,
        testingFeatures: null,
        testingLabels: null,
      }
    };

    // Here we name our elements for easier use throughout the code.
    const elements = {
      modelStatus: document.getElementById("model-status"),
      epochStatus: document.getElementById("epoch-status"),
      testingStatus: document.getElementById("testing-status"),

      predictionInput: document.getElementById("prediction-input"),
      predictionOutput: document.getElementById("prediction-output"),

      trainButton: document.getElementById("train-button"),
      testButton: document.getElementById("test-button"),
      predictButton: document.getElementById("predict-button"),
      loadButton: document.getElementById("load-button"),
      saveButton: document.getElementById("save-button"),
    };

    // UI elements. All our buttons and text fields are placed here we easier structure.
    function setStatus(message) {
      elements.modelStatus.innerText = message;
    }

    function setEpochStatus(epoch, loss) {
      elements.epochStatus.innerText =
        `Epoch ${epoch + 1} | Loss: ${loss.toFixed(4)}`;
    }

    function setTestingStatus(loss) {
      elements.testingStatus.innerText =
        `Test Loss: ${loss.toFixed(4)}`;
    }

    function enableButtons() {
      elements.trainButton.disabled = false;
      elements.testButton.disabled = false;
      elements.loadButton.disabled = false;
      elements.saveButton.disabled = false;
    }

    function enablePrediction() {
      elements.predictButton.disabled = false;
    }

    function toggleVisor() {
      tfvis.visor().toggle();
    }

    // The visual part of the tensor. Our graphs and our plot lines are set inside this block
    async function plot(pointsArray, predictedPointsArray = null) {
      const values = [pointsArray];
      const series = ["Original"];

      if (predictedPointsArray) {
        values.push(predictedPointsArray);
        series.push("Predicted");
      }

      tfvis.render.scatterplot(
        { name: "Age vs Insurance Cost" },
        { values, series },
        {
          xLabel: "Age",
          yLabel: "Insurance Cost",
          height: 400
        }
      );
    }

    async function plotPredictionLine() {
      const [xs, ys] = tf.tidy(() => {
        const normalizedXs = tf.linspace(0, 1, 100);

        const normalizedYs =
          state.model.predict(
            normalizedXs.reshape([100, 1])
          );

        const xs = denormalize(
          normalizedXs,
          state.normalization.featureMin,
          state.normalization.featureMax
        );

        const ys = denormalize(
          normalizedYs,
          state.normalization.labelMin,
          state.normalization.labelMax
        );

        return [
          xs.dataSync(),
          ys.dataSync()
        ];
      });

      const predictedPoints = Array.from(xs).map((x, i) => ({
        x,
        y: ys[i]
      }));

      await plot(state.points, predictedPoints);
    }

    // Here we load the data and set what column we are looking at.
    // In this instance we are looking at annual price compared to your age in the US.
    async function loadDataset() {
      const dataset =
        tf.data.csv("medical_insurance_cost_dataset.csv");

      const pointsDataset = dataset
        .map(record => ({
          x: Number(record.age),
          y: Number(record.annual_medical_cost_usd)
        }))
        .filter(point =>
          !isNaN(point.x) &&
          !isNaN(point.y)
        );

      const points = await pointsDataset.toArray();
      tf.util.shuffle(points);
      return points;
    }

    function createTensors(points) {
      return tf.tidy(() => {

        const featureTensor = tf.tensor2d(
          points.map(p => p.x),
          [points.length, 1]
        );

        const labelTensor = tf.tensor2d(
          points.map(p => p.y),
          [points.length, 1]
        );

        return {
          featureTensor,
          labelTensor
        };
      });
    }

    // Normalization of the data we have.
    function normalize(tensor, previousMin = null, previousMax = null) {

      const min = previousMin || tensor.min();
      const max = previousMax || tensor.max();

      const normalizedTensor =
        tensor.sub(min).div(max.sub(min));

      return {
        tensor: normalizedTensor,
        min,
        max
      };
    }

    function denormalize(tensor, min, max) {
      return tensor
        .mul(max.sub(min))
        .add(min);
    }

    function prepareData(featureTensor, labelTensor) {
      const normalizedFeatures =
        normalize(featureTensor);

      const normalizedLabels =
        normalize(labelTensor);

      state.normalization.featureMin =
        normalizedFeatures.min;

      state.normalization.featureMax =
        normalizedFeatures.max;

      state.normalization.labelMin =
        normalizedLabels.min;

      state.normalization.labelMax =
        normalizedLabels.max;

      [
        state.tensors.trainingFeatures,
        state.tensors.testingFeatures
      ] = tf.split(normalizedFeatures.tensor, 2);

      [
        state.tensors.trainingLabels,
        state.tensors.testingLabels
      ] = tf.split(normalizedLabels.tensor, 2);
    }

    // Creation of the model. Here we decide on how many dims we want, which decides how many columns we are looking at.
    function createModel() {
      const model = tf.sequential();

      model.add(tf.layers.dense({
        inputDim: 1,
        units: 1,
        activation: "linear",
        useBias: true
      }));

      model.compile({
        optimizer: tf.train.adam(0.01),
        loss: "meanSquaredError"
      });

      tfvis.show.modelSummary(
        { name: "Model Summary", tab: "Model" },
        model
      );

      tfvis.show.layer(
        { name: "Layer 1", tab: "Model Inspection" },
        model.getLayer(undefined, 0)
      );

      return model;
    }

    // Training of the model. We set the epochs value depending on how many times we want the model to run.
    // Higher epoch values results in better accuracy, but the training takes longer.
    async function train() {
      const callbacks = tfvis.show.fitCallbacks(
        { name: "Training Performance" },
        ["loss"]
      );

      await state.model.fit(
        state.tensors.trainingFeatures,
        state.tensors.trainingLabels,
        {
          epochs: 5,
          shuffle: true,
          callbacks: {
            onBatchEnd: callbacks.onBatchEnd,
            onEpochEnd: async (epoch, logs) => {
              setEpochStatus(epoch, logs.loss);

              tfvis.show.layer(
                { name: "Layer 1" },
                state.model.getLayer(undefined, 0)
              );

              await plotPredictionLine();
            }
          }
        }
      );

      enablePrediction();
      console.log("Training complete!");
    }


    // Testing the loss of our trained model.
    async function test() {
      const result = state.model.evaluate(
        state.tensors.testingFeatures,
        state.tensors.testingLabels
      );

      const lossTensor =
        Array.isArray(result)
          ? result[0]
          : result;

      const loss =
        lossTensor.dataSync()[0];

      setTestingStatus(loss);

      const predictions = state.model.predict(
        state.tensors.testingFeatures
      );

      const predictionValues =
        await predictions.array();

      const featureValues =
        await state.tensors.testingFeatures.array();

      await plot(
        featureValues.map((x, i) => ({
          x: x[0],
          y: predictionValues[i][0]
        }))
      );

      console.log("Testing complete");
    }

    // Prediction for the dataset.
    function predictValue(value) {
      return tf.tidy(() => {
        const inputTensor =
          tf.tensor2d([[value]]);

        const normalizedInput =
          inputTensor
            .sub(state.normalization.featureMin)
            .div(
              state.normalization.featureMax.sub(
                state.normalization.featureMin
              )
            );

        const predictionTensor =
          state.model.predict(normalizedInput);

        const denormalizedPrediction =
          denormalize(
            predictionTensor,
            state.normalization.labelMin,
            state.normalization.labelMax
          );

        return denormalizedPrediction.dataSync()[0];
      });
    }

    function predict() {
      const value =
        Number(elements.predictionInput.value);

      if (isNaN(value)) {
        elements.predictionOutput.innerText =
          "Please enter a valid age.";
        return;
      }

      const prediction =
        predictValue(value);

      elements.predictionOutput.innerText =
        `Predicted Insurance Cost: $${prediction.toFixed(2)}`;
    }

    // Save and Load functions for the trained model. Gets stored in local storage for faster fetching after reload
    async function saveModel() {
      await state.model.save(
        "localstorage://insurance-model"
      );

      console.log("Model saved");
    }

    async function loadModel() {
      state.model =
        await tf.loadLayersModel(
          "localstorage://insurance-model"
        );

      enablePrediction();

      tfvis.show.modelSummary(
        { name: "Model Summary", tab: "Model" },
        state.model
      );

      tfvis.show.layer(
        { name: "Layer 1", tab: "Model Inspection" },
        state.model.getLayer(undefined, 0)
      );

      await plotPredictionLine();
      setStatus("Model loaded successfully.");

      console.log("Model loaded");
    }


    // Here we initialize the app, loading and creation of the model
    async function initializeApp() {
      setStatus("Loading dataset...");
      state.points = await loadDataset();

      await plot(state.points);
      setStatus("Creating tensors...");

      const {
        featureTensor,
        labelTensor
      } = createTensors(state.points);

      prepareData(
        featureTensor,
        labelTensor
      );

      setStatus("Creating model...");

      state.model = createModel();
      enableButtons();
      setStatus("Ready to train.");
    }

    initializeApp();

  </script>
</body>

</html>
