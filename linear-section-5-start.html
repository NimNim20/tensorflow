<!DOCTYPE html>
<html>

<head>
  <title>TensorFlow.js linear regression</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
</head>

<body>
  <button onclick="saveModel()">Save Model</button>
  <!-- <button onclick="loadModel()">Load Model</button> -->

  <h3>Load Downloaded Model</h3>

  <input type="file" id="modelUpload" multiple />

  <button onclick="loadDownloadedModel()">
    Load Downloaded Model
  </button>

  <h3>Predict House Price</h3>

  <input type="number" id="sqftInput" placeholder="Enter square feet" />

  <button onclick="predict()">Predict Price</button>

  <p id="predictionResult"></p>

  <script type="text/javascript">
    let model;

    let featureMin;
    let featureMax;

    let labelMin;
    let labelMax;

    async function plot(pointsArray, featureName) {
      tfvis.render.scatterplot(
        { name: `${featureName} vs House Price` },
        { values: [pointsArray], series: ["original"] },
        {
          xLabel: featureName,
          yLabel: "Price",
        }
      )
    }

    function normalise(tensor) {
      const min = tensor.min();
      const max = tensor.max();
      const normalisedTensor = tensor.sub(min).div(max.sub(min));
      return {
        tensor: normalisedTensor,
        min,
        max
      };
    }

    function denormalise(tensor, min, max) {
      const denormalisedTensor = tensor.mul(max.sub(min)).add(min);
      return denormalisedTensor;
    }

    function createModel() {
      const model = tf.sequential();

      // Here we decide how many inputs we can have. Since we are only checking square feet, we only need inputDim to be 1.
      model.add(tf.layers.dense({
        inputDim: 1,
        units: 1,
        activation: "linear",
        useBias: true
      }));

      const optimizer = tf.train.sgd(0.1);

      model.compile({
        optimizer,
        loss: "meanSquaredError"
      });

      tfvis.show.modelSummary({ name: `Model Summary`, tab: `Model` }, model);
      tfvis.show.layer({ name: `Layer 1`, tab: `Model Inspection` }, model.getLayer(undefined, 0));

      model.summary();

      return model;
    }

    async function trainModel(model, trainingFeatureTensor, trainingLabelTensor) {
      const { onBatchEnd, onEpochEnd } = tfvis.show.fitCallbacks(
        { name: "Training Performance" },
        ["loss"]
      );

      // Epochs decides how many times the AI runs the training model
      await model.fit(trainingFeatureTensor, trainingLabelTensor, {
        epochs: 5,
        shuffle: true,
        callbacks: {
          onBatchEnd,
          onEpochEnd,
          onEpochBegin: function () {
            tfvis.show.layer({ name: `Layer 1` }, model.getLayer(undefined, 0));
          }
        }
      });
    }

    async function testModel(model, testingFeatureTensor, testingLabelTensor) {
      const result = model.evaluate(testingFeatureTensor, testingLabelTensor);

      const lossTensor = Array.isArray(result) ? result[0] : result;

      const loss = await lossTensor.dataSync()[0];
      console.log(`Testing Loss: ${loss}`);
    }

    async function saveModel() {
      if (!model) {
        console.log("No model to save.");
        return;
      }

      await model.save("downloads://house-price-model");

      console.log("Model saved!");
    }

    async function loadModel() {
      model = await tf.loadLayersModel(
        "localstorage://house-price-model"
      );

      console.log("Model loaded!");

      model.summary();

      tfvis.show.modelSummary(
        { name: `Loaded Model Summary`, tab: `Model` },
        model
      );
    }

    async function loadDownloadedModel() {
      const files =
        document.getElementById("modelUpload").files;

      if (files.length === 0) {
        console.log("No files selected.");
        return;
      }

      // Find correct files regardless of order
      const jsonFile =
        Array.from(files).find(file =>
          file.name.endsWith(".json")
        );

      const weightsFile =
        Array.from(files).find(file =>
          file.name.endsWith(".bin")
        );

      if (!jsonFile || !weightsFile) {
        console.log("Missing model files.");
        return;
      }

      model = await tf.loadLayersModel(
        tf.io.browserFiles([
          jsonFile,
          weightsFile
        ])
      );

      console.log("Downloaded model loaded!");

      model.summary();

      tfvis.show.modelSummary(
        { name: "Loaded Downloaded Model" },
        model
      );
    }

    async function predict() {
      if (!model) {
        console.log("Model not loaded.");
        return;
      }

      const inputValue =
        Number(document.getElementById("sqftInput").value);

      const inputTensor = tf.tensor2d([[inputValue]]);

      // Normalise input
      const normalisedInput = inputTensor
        .sub(featureMin)
        .div(featureMax.sub(featureMin));

      // Predict
      const predictionTensor =
        model.predict(normalisedInput);

      // Denormalise prediction
      const denormalisedPrediction = denormalise(
        predictionTensor,
        labelMin,
        labelMax
      );

      const prediction =
        denormalisedPrediction.dataSync()[0];

      document.getElementById(
        "predictionResult"
      ).innerText =
        `Predicted Price: $${prediction.toFixed(2)}`;
    }

    async function run() {
      // Import from CSV
      const houseSalesDataset = tf.data.csv("kc_house_data.csv");

      // Extract x and y values to plot
      const pointsDataset = houseSalesDataset.map(record => ({
        x: record.sqft_living,
        y: record.price,
      }));
      const points = await pointsDataset.toArray();
      if (points.length % 2 !== 0) { // If odd number of elements
        points.pop(); // remove one element
      }
      tf.util.shuffle(points);
      plot(points, "Square feet");

      // Extract Features (inputs)
      const featureValues = points.map(p => p.x);
      const featureTensor = tf.tensor2d(featureValues, [featureValues.length, 1]);

      // Extract Labels (outputs)
      const labelValues = points.map(p => p.y);
      const labelTensor = tf.tensor2d(labelValues, [labelValues.length, 1]);

      // Normalise features and labels
      const normalisedFeature = normalise(featureTensor);
      const normalisedLabel = normalise(labelTensor);

      // Prediction feature
      featureMin = normalisedFeature.min;
      featureMax = normalisedFeature.max;

      labelMin = normalisedLabel.min;
      labelMax = normalisedLabel.max;

      const [trainingFeatureTensor, testingFeatureTensor] = tf.split(normalisedFeature.tensor, 2);
      const [trainingLabelTensor, testingLabelTensor] = tf.split(normalisedLabel.tensor, 2);

      model = createModel();

      await trainModel(model, trainingFeatureTensor, trainingLabelTensor);
      await testModel(model, testingFeatureTensor, testingLabelTensor)
    }

    run();
  </script>

</body>

</html>
